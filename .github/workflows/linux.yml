name: Linux RDP (Fixed)

on:
  workflow_dispatch:

jobs:
  linux-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Update System
        run: |
          sudo apt-get update -y
          sudo apt-get upgrade -y

      - name: Install Desktop + XRDP (FIXED)
        run: |
          sudo apt-get install -y xfce4 xfce4-goodies xrdp dbus-x11

          # FIX: Proper XFCE session config
          echo "xfce4-session" > ~/.xsession
          sudo cp ~/.xsession /etc/skel/.xsession

          # FIX: XRDP startwm.sh configuration
          sudo sed -i 's/^test -x/#&/' /etc/xrdp/startwm.sh
          sudo sed -i 's/^exec/#&/' /etc/xrdp/startwm.sh
          echo "startxfce4" | sudo tee -a /etc/xrdp/startwm.sh

          # FIX: Add xrdp user to ssl-cert
          sudo adduser xrdp ssl-cert

          # Restart XRDP
          sudo systemctl restart xrdp

          # Allow port
          sudo ufw allow 3389 || true

      - name: Create User
        run: |
          PASSWORD=$(openssl rand -base64 16)

          sudo useradd -m rdpuser
          echo "rdpuser:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo rdpuser

          echo "RDP_USER=rdpuser" >> $GITHUB_ENV
          echo "RDP_PASS=$PASSWORD" >> $GITHUB_ENV

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect Tailscale
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} \
            --hostname=linux-${{ github.run_id }}

          for i in {1..10}; do
            TS_IP=$(tailscale ip -4 2>/dev/null)
            [ -n "$TS_IP" ] && break
            sleep 5
          done

          if [ -z "$TS_IP" ]; then
            echo "No Tailscale IP"
            exit 1
          fi

          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Show Access Info
        run: |
          echo "========== RDP =========="
          echo "IP: $TAILSCALE_IP"
          echo "User: $RDP_USER"
          echo "Pass: $RDP_PASS"
          echo "========================="

      - name: Keep Alive
        run: |
          while true; do
            echo "RDP running..."
            sleep 300
          done
