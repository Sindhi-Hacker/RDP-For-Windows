name: Linux RDP (ULTIMATE FIX)

on:
  workflow_dispatch:

jobs:
  linux-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Update System
        run: |
          sudo apt-get update -y
          sudo apt-get upgrade -y

      - name: Install LXDE + XRDP (Fixed)
        run: |
          sudo apt-get install -y lxde-core lxterminal xrdp dbus-x11

          # FIX 1: Proper session file for user
          echo "startlxde" > /home/runner/.xsession

          # FIX 2: Force XRDP to use LXDE correctly
          sudo sed -i 's/^test -x/#&/' /etc/xrdp/startwm.sh
          sudo sed -i 's/^exec/#&/' /etc/xrdp/startwm.sh
          echo "startlxde" | sudo tee -a /etc/xrdp/startwm.sh

          # FIX 3: Permissions
          sudo adduser xrdp ssl-cert

          # Restart XRDP
          sudo systemctl restart xrdp

      - name: Create RDP User
        run: |
          PASSWORD=$(openssl rand -base64 16)

          sudo useradd -m rdpuser
          echo "rdpuser:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo rdpuser

          # IMPORTANT FIX: give home session
          echo "startlxde" | sudo tee /home/rdpuser/.xsession
          sudo chown rdpuser:rdpuser /home/rdpuser/.xsession

          echo "RDP_USER=rdpuser" >> $GITHUB_ENV
          echo "RDP_PASS=$PASSWORD" >> $GITHUB_ENV

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect Tailscale
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} \
            --hostname=linux-${{ github.run_id }}

          for i in {1..10}; do
            TS_IP=$(tailscale ip -4 2>/dev/null)
            [ -n "$TS_IP" ] && break
            sleep 5
          done

          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Show Info
        run: |
          echo "=========== RDP ==========="
          echo "IP: $TAILSCALE_IP"
          echo "User: $RDP_USER"
          echo "Pass: $RDP_PASS"
          echo "==========================="

      - name: Keep Alive
        run: |
          while true; do
            echo "Running..."
            sleep 300
          done
