name: Linux RDP (Clean & Stable)

on:
  workflow_dispatch:

jobs:
  linux-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Update System
        run: |
          sudo apt-get update -y
          sudo apt-get upgrade -y

      - name: Install XFCE Desktop and XRDP
        run: |
          sudo apt-get install -y xfce4 xfce4-goodies xrdp dbus-x11

          # Fix XRDP startup
          echo '#!/bin/sh' | sudo tee /etc/xrdp/startwm.sh
          echo 'unset DBUS_SESSION_BUS_ADDRESS' | sudo tee -a /etc/xrdp/startwm.sh
          echo 'unset XDG_RUNTIME_DIR' | sudo tee -a /etc/xrdp/startwm.sh
          echo 'startxfce4' | sudo tee -a /etc/xrdp/startwm.sh

          sudo chmod +x /etc/xrdp/startwm.sh

          # Restart XRDP
          sudo systemctl restart xrdp
          sudo adduser xrdp ssl-cert

      - name: Improve UI (Theme)
        run: |
          sudo apt-get install -y arc-theme papirus-icon-theme

      - name: Create RDP User
        run: |
          USER=rdpuser
          PASS='rdpuser123#'

          sudo useradd -m $USER
          echo "$USER:$PASS" | sudo chpasswd
          sudo usermod -aG sudo $USER

          echo "startxfce4" | sudo tee /home/$USER/.xsession
          sudo chown $USER:$USER /home/$USER/.xsession

          echo "RDP_USER=$USER" >> $GITHUB_ENV
          echo "RDP_PASS=$PASS" >> $GITHUB_ENV

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect Tailscale
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=linux-${{ github.run_id }}

          for i in {1..10}; do
            TS_IP=$(tailscale ip -4 2>/dev/null)
            if [ ! -z "$TS_IP" ]; then break; fi
            sleep 5
          done

          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Show RDP Info
        run: |
          echo "=========== RDP ==========="
          echo "IP: $TAILSCALE_IP"
          echo "User: $RDP_USER"
          echo "Pass: $RDP_PASS"
          echo "==========================="

      - name: Keep Alive
        run: |
          while true; do
            echo "RDP running..."
            sleep 300
          done
