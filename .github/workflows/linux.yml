name: Linux RDP (Stable LXDE)

on:
  workflow_dispatch:

jobs:
  linux-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Update System
        run: |
          sudo apt-get update -y
          sudo apt-get upgrade -y

      - name: Install LXDE Desktop + XRDP
        run: |
          sudo apt-get install -y lxde-core lxterminal xrdp dbus-x11

          # Clean XRDP startup (IMPORTANT FIX)
          sudo bash -c 'cat > /etc/xrdp/startwm.sh <<EOF
#!/bin/sh
unset DBUS_SESSION_BUS_ADDRESS
unset XDG_RUNTIME_DIR
exec startlxde
EOF'

          sudo chmod +x /etc/xrdp/startwm.sh

          # Restart XRDP
          sudo systemctl daemon-reexec
          sudo systemctl enable xrdp
          sudo systemctl restart xrdp

          # Fix permission
          sudo adduser xrdp ssl-cert

          # Open port
          sudo ufw allow 3389 || true

      - name: Create RDP User
        run: |
          PASSWORD=$(openssl rand -base64 16)

          sudo useradd -m rdpuser
          echo "rdpuser:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo rdpuser

          echo "RDP_USER=rdpuser" >> $GITHUB_ENV
          echo "RDP_PASS=$PASSWORD" >> $GITHUB_ENV

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect Tailscale
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} \
            --hostname=linux-${{ github.run_id }}

          for i in {1..10}; do
            TS_IP=$(tailscale ip -4 2>/dev/null)
            [ -n "$TS_IP" ] && break
            sleep 5
          done

          if [ -z "$TS_IP" ]; then
            echo "❌ Failed to get Tailscale IP"
            exit 1
          fi

          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Show RDP Info
        run: |
          echo ""
          echo "=========== LINUX RDP ==========="
          echo "IP       : $TAILSCALE_IP"
          echo "Port     : 3389"
          echo "Username : $RDP_USER"
          echo "Password : $RDP_PASS"
          echo "================================="
          echo ""

      - name: Keep Session Alive
        run: |
          while true; do
            echo "[$(date)] RDP running..."
            sleep 300
          done
