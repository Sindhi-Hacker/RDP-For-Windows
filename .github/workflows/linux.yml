name: Linux RDP (Professional)

on:
  workflow_dispatch:

jobs:
  linux-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      DEBIAN_FRONTEND: noninteractive
      RDP_USER: murshidm
      RDP_PASS: Hacker123#

    steps:
      - name: Update Package Index
        run: sudo apt-get update -y

      - name: Install Desktop, XRDP, and Tools
        run: |
          sudo apt-get install -y \
            ubuntu-mate-core \
            mate-terminal \
            xrdp \
            xorgxrdp \
            dbus-x11 \
            x11-xserver-utils \
            net-tools \
            curl

      - name: Configure XRDP Session
        run: |
          sudo tee /etc/xrdp/startwm.sh >/dev/null <<'EOF'
          #!/bin/sh
          set -eu

          if [ -r /etc/profile ]; then
            . /etc/profile
          fi

          USER_NAME="${LOGNAME:-${USER:-}}"
          if [ -z "$USER_NAME" ]; then
            echo "XRDP user not found"
            exit 1
          fi

          USER_HOME="$(getent passwd "$USER_NAME" | cut -d: -f6)"
          if [ -z "$USER_HOME" ]; then
            echo "XRDP home directory not found for $USER_NAME"
            exit 1
          fi

          export USER="$USER_NAME"
          export LOGNAME="$USER_NAME"
          export HOME="$USER_HOME"
          export SHELL="/bin/bash"
          export LANG="en_US.UTF-8"
          export XDG_SESSION_TYPE="x11"
          export DESKTOP_SESSION="mate"
          export XDG_CURRENT_DESKTOP="MATE"
          export XDG_CONFIG_HOME="$HOME/.config"
          export XDG_CACHE_HOME="$HOME/.cache"
          export XDG_DATA_HOME="$HOME/.local/share"

          unset DBUS_SESSION_BUS_ADDRESS
          unset XDG_RUNTIME_DIR

          mkdir -p "$XDG_CONFIG_HOME" "$XDG_CACHE_HOME" "$XDG_DATA_HOME" "$HOME/.config/caja"

          if [ -r "$HOME/.profile" ]; then
            . "$HOME/.profile"
          fi

          exec dbus-launch --exit-with-session mate-session
          EOF

          echo "allowed_users=anybody" | sudo tee /etc/X11/Xwrapper.config >/dev/null
          sudo chmod 755 /etc/xrdp/startwm.sh
          sudo adduser xrdp ssl-cert
          sudo systemctl enable xrdp
          sudo systemctl restart xrdp

      - name: Create RDP User
        run: |
          if ! id -u "$RDP_USER" >/dev/null 2>&1; then
            sudo useradd -m -s /bin/bash "$RDP_USER"
          fi

          echo "$RDP_USER:$RDP_PASS" | sudo chpasswd
          sudo usermod -aG sudo "$RDP_USER"

          sudo install -d -m 700 -o "$RDP_USER" -g "$RDP_USER" "/home/$RDP_USER/.config"
          sudo install -d -m 700 -o "$RDP_USER" -g "$RDP_USER" "/home/$RDP_USER/.config/caja"
          sudo install -d -m 700 -o "$RDP_USER" -g "$RDP_USER" "/home/$RDP_USER/.cache"
          sudo install -d -m 700 -o "$RDP_USER" -g "$RDP_USER" "/home/$RDP_USER/.local/share"

          sudo tee "/home/$RDP_USER/.xsession" >/dev/null <<'EOF'
          mate-session
          EOF
          sudo tee "/home/$RDP_USER/.xsessionrc" >/dev/null <<'EOF'
          export XDG_SESSION_TYPE=x11
          export DESKTOP_SESSION=mate
          export XDG_CURRENT_DESKTOP=MATE
          export XDG_CONFIG_HOME="$HOME/.config"
          export XDG_CACHE_HOME="$HOME/.cache"
          export XDG_DATA_HOME="$HOME/.local/share"
          EOF

          sudo chown "$RDP_USER:$RDP_USER" "/home/$RDP_USER/.xsession" "/home/$RDP_USER/.xsessionrc"
          sudo chmod 600 "/home/$RDP_USER/.xsession" "/home/$RDP_USER/.xsessionrc"

          echo "RDP_PASS=$RDP_PASS" >> "$GITHUB_ENV"

      - name: Validate XRDP
        run: |
          sudo systemctl --no-pager --full status xrdp
          sudo ss -ltnp | grep ':3389'

      - name: Install Tailscale
        run: curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect Tailscale
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=linux-${{ github.run_id }}

          for i in {1..12}; do
            TS_IP="$(sudo tailscale ip -4 2>/dev/null | head -n 1)"
            if [ -n "$TS_IP" ]; then
              break
            fi
            sleep 5
          done

          if [ -z "$TS_IP" ]; then
            echo "Failed to get Tailscale IP"
            sudo tailscale status || true
            exit 1
          fi

          echo "TAILSCALE_IP=$TS_IP" >> "$GITHUB_ENV"

      - name: Optimize Desktop
        run: |
          sudo -iu "$RDP_USER" bash -lc '
            export HOME="/home/$RDP_USER"
            export XDG_RUNTIME_DIR="/tmp/xdg-runtime-$RDP_USER"
            mkdir -p "$XDG_RUNTIME_DIR"
            chmod 700 "$XDG_RUNTIME_DIR"
            dbus-launch --exit-with-session gsettings set org.mate.interface enable-animations false || true
            dbus-launch --exit-with-session gsettings set org.mate.Marco.general compositing-manager false || true
          '

      - name: Show RDP Info
        run: |
          echo "=========== LINUX RDP ==========="
          echo "IP       : $TAILSCALE_IP"
          echo "Port     : 3389"
          echo "Username : $RDP_USER"
          echo "Password : $RDP_PASS"
          echo "Desktop  : MATE over XRDP"
          echo "Timeout  : 360 minutes max on GitHub-hosted runners"
          echo "================================="

      - name: Keep Alive
        run: |
          while true; do
            echo "[$(date)] RDP running..."
            sleep 300
          done
