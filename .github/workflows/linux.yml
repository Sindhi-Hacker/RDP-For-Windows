name: Linux RDP (Fast & Clean UI)

on:
  workflow_dispatch:

jobs:
  linux-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Update System
        run: |
          sudo apt-get update -y
          sudo apt-get upgrade -y

      - name: Install XFCE (Better UI) + XRDP
        run: |
          sudo apt-get install -y xfce4 xfce4-goodies xrdp dbus-x11

          # Fix XRDP startup
          sudo bash -c 'cat > /etc/xrdp/startwm.sh <<EOF
#!/bin/sh
unset DBUS_SESSION_BUS_ADDRESS
unset XDG_RUNTIME_DIR
startxfce4
EOF'

          sudo chmod +x /etc/xrdp/startwm.sh

          # Restart XRDP
          sudo systemctl restart xrdp
          sudo adduser xrdp ssl-cert

      - name: Improve UI Look (Make XFCE look like Ubuntu)
        run: |
          # Install themes & icons
          sudo apt-get install -y arc-theme papirus-icon-theme

          # Apply theme globally
          mkdir -p /home/runner/.config/xfce4/xfconf/xfce-perchannel-xml

          cat > /home/runner/.config/xfce4/xfconf/xfce-perchannel-xml/xsettings.xml <<EOF
<?xml version="1.0" encoding="UTF-8"?>
<channel name="xsettings" version="1.0">
  <property name="Net/ThemeName" type="string" value="Arc-Dark"/>
  <property name="Net/IconThemeName" type="string" value="Papirus"/>
</channel>
EOF

      - name: Create User (Simple Password)
        run: |
          USER=rdpuser
          PASS="rdpuser123#"

          sudo useradd -m $USER
          echo "$USER:$PASS" | sudo chpasswd
          sudo usermod -aG sudo $USER

          # Fix session
          echo "startxfce4" | sudo tee /home/$USER/.xsession
          sudo chown $USER:$USER /home/$USER/.xsession

          echo "RDP_USER=$USER" >> $GITHUB_ENV
          echo "RDP_PASS=$PASS" >> $GITHUB_ENV

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect Tailscale
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} \
            --hostname=linux-${{ github.run_id }}

          for i in {1..10}; do
            TS_IP=$(tailscale ip -4 2>/dev/null)
            [ -n "$TS_IP" ] && break
            sleep 5
          done

          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Show RDP Info
        run: |
          echo "=========== RDP ==========="
          echo "IP: $TAILSCALE_IP"
          echo "User: $RDP_USER"
          echo "Pass: $RDP_PASS"
          echo "==========================="

      - name: Keep Alive
        run: |
          while true; do
            echo "Running..."
            sleep 300
          done
