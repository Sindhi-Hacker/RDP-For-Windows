name: Linux RDP (Professional)

on:
  workflow_dispatch:

jobs:
  linux-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Update System
        run: |
          sudo apt-get update -y
          sudo apt-get upgrade -y

      - name: Install MATE Desktop + XRDP
        run: |
          sudo apt-get install -y ubuntu-mate-core xrdp dbus-x11

          # Set MATE session for XRDP (VERY IMPORTANT FIX)
          echo '#!/bin/sh' | sudo tee /etc/xrdp/startwm.sh
          echo 'export XDG_SESSION_TYPE=x11' | sudo tee -a /etc/xrdp/startwm.sh
          echo 'export DESKTOP_SESSION=mate' | sudo tee -a /etc/xrdp/startwm.sh
          echo 'export XDG_CURRENT_DESKTOP=MATE' | sudo tee -a /etc/xrdp/startwm.sh
          echo 'exec mate-session' | sudo tee -a /etc/xrdp/startwm.sh

          sudo chmod +x /etc/xrdp/startwm.sh

          # Fix permissions
          sudo adduser xrdp ssl-cert

          # Restart XRDP
          sudo systemctl restart xrdp

      - name: Create RDP User
        run: |
          USER=rdpuser
          PASS='rdpuser123#'

          sudo useradd -m $USER
          echo "$USER:$PASS" | sudo chpasswd
          sudo usermod -aG sudo $USER

          # Set MATE session for user
          echo "mate-session" | sudo tee /home/$USER/.xsession
          sudo chown $USER:$USER /home/$USER/.xsession

          echo "RDP_USER=$USER" >> $GITHUB_ENV
          echo "RDP_PASS=$PASS" >> $GITHUB_ENV

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect Tailscale
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=linux-${{ github.run_id }}

          for i in {1..10}; do
            TS_IP=$(tailscale ip -4 2>/dev/null)
            if [ ! -z "$TS_IP" ]; then break; fi
            sleep 5
          done

          if [ -z "$TS_IP" ]; then
            echo "Failed to get Tailscale IP"
            exit 1
          fi

          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Show RDP Info
        run: |
          echo "=========== LINUX RDP ==========="
          echo "IP       : $TAILSCALE_IP"
          echo "Port     : 3389"
          echo "Username : $RDP_USER"
          echo "Password : $RDP_PASS"
          echo "================================="

      - name: Optimize Performance
        run: |
          echo "Disabling animations for better speed"
          gsettings set org.mate.interface enable-animations false || true

      - name: Keep Alive
        run: |
          while true; do
            echo "[$(date)] RDP running..."
            sleep 300
          done
